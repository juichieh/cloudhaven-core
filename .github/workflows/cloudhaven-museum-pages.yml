name: Deploy Cloudhaven Museum to Pages

on:
  push:
    branches:
      - main
    paths:
      - "rooms/cloudhaven-museum/website/**"
      - ".github/workflows/cloudhaven-museum-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cloudhaven-museum-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static museum
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Museum website
        uses: actions/upload-pages-artifact@v4
        with:
          path: rooms/cloudhaven-museum/website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
